<!DOCTYPE html>
<html>
<head>
    <title>Arcade User Verifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Arcade User Verifier</h1>
        <div class="status">
            <div class="status-label">Current User</div>
            <div class="status-value {{ 'inactive' if not logged_in }}">
                {{ user_id if logged_in else 'Not logged in' }}
            </div>
        </div>
        {% if logged_in %}
        <form method="POST" action="/logout">
            <button type="submit" class="logout-btn">Logout</button>
        </form>
        {% endif %}
        {% if mode == 'flexible' %}
        <form method="POST">
            <input type="text" name="user_id"
                   placeholder="Enter user ID (e.g. user@example.com)"
                   value="{{ user_id or '' }}" />
            <br>
            <button type="submit">Set User</button>
        </form>
        {% endif %}
        <p class="info">Verifier endpoint: <code>/auth/verify</code></p>
        <p class="info">Mode: <code>{{ mode }}</code></p>
        {% if mode == 'protected' %}
        <p class="info" style="margin-top: 1rem;">
            <a href="/admin">Admin: generate auth links</a>
        </p>
        {% endif %}
    </div>
</body>
</html>
